<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <meta name="description" content="Dopamine Reset Mini — tracker diario para romper con la sobreestimulación. Mobile-first. 100% local." />
  <meta name="color-scheme" content="dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dopamine Reset" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Dopamine Reset · Mini Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <span class="logo" aria-hidden="true">◐</span>
        <div>
          <h1>Dopamine Reset</h1>
          <p class="subtitle">Mini Tracker · 7 hábitos antidopamina</p>
        </div>
      </div>
      <button id="menuBtn" class="ghost" aria-label="Menú">···</button>
    </header>

    <section class="hero" aria-live="polite">
      <div class="ring">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="60" r="52" class="ring-bg"></circle>
          <circle cx="60" cy="60" r="52" class="ring-fg" id="ring"></circle>
        </svg>
        <div class="ring-center">
          <div id="ringCount">0<span>/7</span></div>
          <div class="ring-label">hoy</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="streak">0</div>
          <div class="stat-label">racha</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="totalDays">0</div>
          <div class="stat-label">días ok</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="level">N1</div>
          <div class="stat-label">nivel</div>
        </div>
      </div>
    </section>

    <section class="habits" id="habits" aria-label="Hábitos de hoy">
      <!-- inyectado por JS -->
    </section>

    <section class="week" aria-label="Últimos 7 días">
      <div class="week-title">Últimos 7 días</div>
      <div class="week-grid" id="weekGrid"></div>
    </section>

    <section class="cta">
      <a class="cta-link" href="https://producto-protocolo-dopamina.vercel.app" target="_blank" rel="noopener">
        ¿Listo para el reset completo? →
      </a>
      <p class="cta-sub">Plan de 14 días · €9.99</p>
    </section>

    <footer class="foot">
      <span>100% local · sin cuentas · sin tracking</span>
      <button id="resetBtn" class="ghost small">Borrar datos</button>
    </footer>
  </main>

  <dialog id="menu" class="menu">
    <form method="dialog">
      <h3>Opciones</h3>
      <button value="export" class="menu-item">Exportar datos (JSON)</button>
      <button value="import" class="menu-item">Importar datos</button>
      <button value="about" class="menu-item">Sobre esta app</button>
      <button value="close" class="menu-close">Cerrar</button>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./app.js" defer></script>
</body>
</html>
